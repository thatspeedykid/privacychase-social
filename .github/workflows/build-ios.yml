name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Capacitor dependencies
        working-directory: capacitor
        run: npm install

      - name: Add iOS platform
        working-directory: capacitor
        run: npx cap add ios

      - name: Sync web files into iOS
        working-directory: capacitor
        run: npx cap sync ios

      - name: Add camera permission to Info.plist
        working-directory: capacitor/ios/App
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'PrivacyChase needs camera access to scan QR codes for in-person connections.'" App/Info.plist || \
          /usr/libexec/PlistBuddy -c "Set :NSCameraUsageDescription 'PrivacyChase needs camera access to scan QR codes for in-person connections.'" App/Info.plist

      - name: Install CocoaPods
        working-directory: capacitor/ios/App
        run: pod install

      - name: Build unsigned IPA
        working-directory: capacitor
        run: |
          xcodebuild \
            -workspace ios/App/App.xcworkspace \
            -scheme App \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXPANDED_CODE_SIGN_IDENTITY="" \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive

      - name: Package IPA
        run: |
          mkdir -p $RUNNER_TEMP/ipa/Payload
          cp -r $RUNNER_TEMP/App.xcarchive/Products/Applications/*.app $RUNNER_TEMP/ipa/Payload/
          cd $RUNNER_TEMP/ipa
          zip -r PrivacyChase-unsigned.ipa Payload/

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacyChase-iOS-${{ github.run_number }}
          path: ${{ runner.temp }}/ipa/PrivacyChase-unsigned.ipa
          retention-days: 30

name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor dependencies
        working-directory: capacitor
        run: npm install

      - name: Add Android platform
        working-directory: capacitor
        run: npx cap add android

      - name: Sync web files into Android
        working-directory: capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: capacitor/android
        run: chmod +x gradlew

      - name: Build debug APK
        working-directory: capacitor/android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: PrivacyChase-Android-${{ github.run_number }}
          path: capacitor/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
